services:
  db:
    image: mysql:8.0
    container_name: faso_db
    restart: always
    environment:
      MYSQL_DATABASE: fasocommerce
      MYSQL_USER: faso_user
      MYSQL_PASSWORD: fasopass
      MYSQL_ROOT_PASSWORD: rootpass
    volumes:
      - db_data:/var/lib/mysql
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: faso_redis
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    container_name: faso_backend
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  celery:
    build: ./backend
    container_name: faso_celery
    command: celery -A fasocommerce worker -l info
    volumes:
      - ./backend:/app
    env_file:
      - ./backend/.env
    depends_on:
      - redis
      - db

  frontend:
    build: 
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: faso_frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules  # Volume anonyme pour éviter les erreurs d'écriture Windows
    environment:
      - CHOKIDAR_USEPOLLING=true # Pour que le hot-reload fonctionne sur Windows
    depends_on:
      - backend

volumes:
  db_data:
